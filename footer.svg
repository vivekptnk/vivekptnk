<svg fill="none" viewBox="0 0 900 30" width="900" height="30" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .f {
          width: 900px; height: 30px;
          background: transparent;
          position: relative;
        }
        .glow-bar {
          position: absolute; bottom: 0; width: 100%; height: 2px;
          background: linear-gradient(90deg, transparent 0%, #00f0ff 20%, #7b2ff7 40%, #ffd700 60%, #ff6b35 80%, transparent 100%);
          background-size: 200% 100%;
          animation: bar-flow 4s linear infinite;
          box-shadow: 0 0 15px rgba(123,47,247,0.4), 0 0 30px rgba(123,47,247,0.2);
        }
        @keyframes bar-flow { to { background-position: 200% 0; } }
      </style>
      <div class="f"><div class="glow-bar"></div></div>
    </div>
  </foreignObject>
</svg>
