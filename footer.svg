<svg fill="none" viewBox="0 0 900 60" width="900" height="60" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .f {
          width: 900px; height: 60px;
          background: linear-gradient(180deg, transparent 0%, rgba(7,7,13,0.5) 30%, #07070d 100%);
          display: flex; align-items: center; justify-content: center;
          position: relative; overflow: hidden;
        }
        .glow-bar {
          position: absolute; bottom: 0; width: 100%; height: 2px;
          background: linear-gradient(90deg, transparent 0%, #00f0ff 20%, #7b2ff7 40%, #ffd700 60%, #ff6b35 80%, transparent 100%);
          background-size: 200% 100%;
          animation: bar-flow 4s linear infinite;
          box-shadow: 0 0 15px rgba(123,47,247,0.4), 0 0 30px rgba(123,47,247,0.2);
        }
        .txt {
          font-family: 'Courier New', monospace;
          font-size: 0.6em; letter-spacing: 0.3em;
          color: rgba(200,200,220,0.3);
        }
        @keyframes bar-flow { to { background-position: 200% 0; } }
      </style>
      <div class="f">
        <div class="txt">built different</div>
        <div class="glow-bar"></div>
      </div>
    </div>
  </foreignObject>
</svg>
