<svg fill="none" viewBox="0 0 900 320" width="900" height="320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .c {
          width: 900px; height: 320px;
          background: #07070d;
          display: flex; align-items: center; justify-content: center;
          position: relative; overflow: hidden;
          font-family: 'Courier New', monospace;
        }

        /* animated aurora background */
        .aurora {
          position: absolute; width: 100%; height: 100%;
          background: 
            radial-gradient(ellipse 80% 50% at 20% 60%, rgba(123,47,247,0.25) 0%, transparent 60%),
            radial-gradient(ellipse 80% 50% at 80% 40%, rgba(0,240,255,0.2) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 50% 80%, rgba(255,107,53,0.15) 0%, transparent 60%),
            radial-gradient(ellipse 50% 50% at 50% 20%, rgba(255,215,0,0.15) 0%, transparent 60%);
          animation: aurora-shift 10s ease-in-out infinite alternate;
        }

        /* moving gradient blob */
        .blob {
          position: absolute; width: 400px; height: 400px;
          border-radius: 50%;
          filter: blur(80px);
          animation: blob-move 15s ease-in-out infinite;
        }
        .b1 {
          background: rgba(123,47,247,0.3);
          top: -100px; left: -50px;
          animation-delay: 0s;
        }
        .b2 {
          background: rgba(0,240,255,0.2);
          bottom: -100px; right: -50px;
          animation-delay: 5s;
        }
        .b3 {
          background: rgba(255,215,0,0.15);
          top: -50px; right: 200px;
          animation-delay: 10s;
          width: 300px; height: 300px;
        }

        /* grid overlay */
        .g {
          position: absolute; width: 100%; height: 100%;
          background-image: 
            linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        /* visible sacred geometry */
        .geo {
          position: absolute; top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          width: 280px; height: 280px;
          animation: geo-spin 40s linear infinite;
        }

        .geo-ring {
          position: absolute; border-radius: 50%;
          top: 50%; left: 50%;
          border: 1.5px solid;
          animation: ring-breathe 4s ease-in-out infinite;
        }
        .gr1 { width: 120px; height: 120px; transform: translate(-50%, -50%); border-color: rgba(255,215,0,0.35); }
        .gr2 { width: 120px; height: 120px; transform: translate(-15%, -50%); border-color: rgba(123,47,247,0.3); animation-delay: 0.7s; }
        .gr3 { width: 120px; height: 120px; transform: translate(-85%, -50%); border-color: rgba(0,240,255,0.3); animation-delay: 1.4s; }
        .gr4 { width: 120px; height: 120px; transform: translate(-50%, -15%); border-color: rgba(255,107,53,0.25); animation-delay: 0.3s; }
        .gr5 { width: 120px; height: 120px; transform: translate(-50%, -85%); border-color: rgba(255,215,0,0.25); animation-delay: 1s; }
        .gr6 { width: 200px; height: 200px; transform: translate(-50%, -50%); border-color: rgba(255,215,0,0.12); animation-delay: 2s; }
        .gr7 { width: 280px; height: 280px; transform: translate(-50%, -50%); border-color: rgba(123,47,247,0.08); animation-delay: 3s; }

        /* center dot */
        .center-dot {
          position: absolute; top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          width: 8px; height: 8px; border-radius: 50%;
          background: #ffd700;
          box-shadow: 0 0 15px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.3), 0 0 80px rgba(255,215,0,0.1);
          animation: center-pulse 3s ease-in-out infinite;
        }

        /* scan line */
        .scan {
          position: absolute; width: 100%; height: 2px;
          background: linear-gradient(90deg, transparent, rgba(0,240,255,0.4), rgba(123,47,247,0.4), rgba(255,215,0,0.4), transparent);
          box-shadow: 0 0 20px rgba(0,240,255,0.2), 0 -5px 20px rgba(123,47,247,0.1), 0 5px 20px rgba(255,215,0,0.1);
          animation: scan-move 5s ease-in-out infinite;
        }

        /* corner HUD */
        .corner { position: absolute; width: 30px; height: 30px; border-style: solid; border-width: 0; }
        .tl { top: 10px; left: 10px; border-top-width: 2px; border-left-width: 2px; border-color: rgba(0,240,255,0.5); }
        .tr { top: 10px; right: 10px; border-top-width: 2px; border-right-width: 2px; border-color: rgba(123,47,247,0.5); }
        .bl { bottom: 10px; left: 10px; border-bottom-width: 2px; border-left-width: 2px; border-color: rgba(255,215,0,0.5); }
        .br { bottom: 10px; right: 10px; border-bottom-width: 2px; border-right-width: 2px; border-color: rgba(255,107,53,0.5); }

        /* orbiting particles */
        .orb { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .o1 { width: 340px; height: 340px; animation: orb-spin 20s linear infinite; }
        .o2 { width: 260px; height: 260px; animation: orb-spin 28s linear infinite reverse; }

        .dot {
          position: absolute; width: 5px; height: 5px; border-radius: 50%;
        }
        .d1 { top: 0; left: 50%; background: #ffd700; box-shadow: 0 0 8px #ffd700, 0 0 20px rgba(255,215,0,0.4); }
        .d2 { bottom: 0; left: 50%; background: #00f0ff; box-shadow: 0 0 8px #00f0ff, 0 0 20px rgba(0,240,255,0.4); }
        .d3 { top: 50%; left: 0; background: #7b2ff7; box-shadow: 0 0 8px #7b2ff7, 0 0 20px rgba(123,47,247,0.4); }
        .d4 { top: 50%; right: 0; background: #ff6b35; box-shadow: 0 0 8px #ff6b35, 0 0 20px rgba(255,107,53,0.4); }
        .d5 { top: 15%; left: 15%; background: #ffd700; box-shadow: 0 0 8px #ffd700; }
        .d6 { bottom: 15%; right: 15%; background: #00f0ff; box-shadow: 0 0 8px #00f0ff; }

        /* text */
        .content { position: relative; z-index: 10; text-align: center; }

        .name {
          font-size: 2.4em; font-weight: 400; letter-spacing: 0.3em;
          background: linear-gradient(135deg, #ffd700 0%, #ffaa00 25%, #ff6b35 50%, #7b2ff7 75%, #00f0ff 100%);
          background-size: 200% 200%;
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: gradient-text 6s ease-in-out infinite;
          filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
        }

        .divider {
          width: 120px; height: 2px; margin: 14px auto;
          background: linear-gradient(90deg, #00f0ff, #7b2ff7, #ffd700, #ff6b35);
          background-size: 200% 100%;
          animation: gradient-line 4s linear infinite;
          border-radius: 2px;
          box-shadow: 0 0 10px rgba(123,47,247,0.3);
        }

        .sub {
          font-size: 0.7em; letter-spacing: 0.35em;
          color: rgba(200, 200, 220, 0.6);
        }

        @keyframes aurora-shift {
          0% { opacity: 0.7; transform: scale(1); }
          100% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes blob-move {
          0%, 100% { transform: translate(0, 0) scale(1); }
          33% { transform: translate(30px, -30px) scale(1.1); }
          66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes geo-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes ring-breathe {
          0%, 100% { opacity: 1; transform-origin: center; }
          50% { opacity: 0.3; }
        }
        @keyframes center-pulse {
          0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 15px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.3); }
          50% { transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 25px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4), 0 0 100px rgba(255,215,0,0.2); }
        }
        @keyframes scan-move {
          0% { top: -2px; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 320px; opacity: 0; }
        }
        @keyframes orb-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes gradient-text {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        @keyframes gradient-line {
          to { background-position: 200% 0; }
        }
      </style>
      <div class="c">
        <div class="aurora"></div>
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
        <div class="g"></div>
        <div class="scan"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="geo">
          <div class="geo-ring gr1"></div>
          <div class="geo-ring gr2"></div>
          <div class="geo-ring gr3"></div>
          <div class="geo-ring gr4"></div>
          <div class="geo-ring gr5"></div>
          <div class="geo-ring gr6"></div>
          <div class="geo-ring gr7"></div>
        </div>
        <div class="center-dot"></div>
        <div class="orb o1"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div><div class="dot d4"></div></div>
        <div class="orb o2"><div class="dot d5"></div><div class="dot d6"></div></div>
        <div class="content">
          <div class="name">VIVEK PATTANAIK</div>
          <div class="divider"></div>
          <div class="sub">software engineer · bay area</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
