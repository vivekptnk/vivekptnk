<svg fill="none" viewBox="0 0 900 40" width="900" height="40" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .d {
          width: 900px; height: 40px;
          display: flex; align-items: center; justify-content: center;
          background: transparent;
        }
        .line {
          width: 300px; height: 2px;
          background: linear-gradient(90deg, transparent, #00f0ff, #7b2ff7, #ffd700, #ff6b35, transparent);
          background-size: 200% 100%;
          animation: flow 3s linear infinite;
          border-radius: 2px;
          box-shadow: 0 0 8px rgba(123,47,247,0.3), 0 0 20px rgba(123,47,247,0.1);
        }
        .dot {
          width: 6px; height: 6px; border-radius: 50%;
          background: #ffd700;
          box-shadow: 0 0 6px #ffd700, 0 0 15px rgba(255,215,0,0.4);
          margin: 0 12px;
          animation: dot-pulse 2s ease-in-out infinite;
        }
        .dot:nth-child(1) { animation-delay: 0s; background: #00f0ff; box-shadow: 0 0 6px #00f0ff; }
        .dot:nth-child(3) { animation-delay: 0.5s; }
        .dot:nth-child(5) { animation-delay: 1s; background: #7b2ff7; box-shadow: 0 0 6px #7b2ff7; }
        @keyframes flow { to { background-position: 200% 0; } }
        @keyframes dot-pulse {
          0%, 100% { transform: scale(1); opacity: 0.6; }
          50% { transform: scale(1.4); opacity: 1; }
        }
      </style>
      <div class="d">
        <div class="dot"></div>
        <div class="line"></div>
        <div class="dot"></div>
        <div class="line"></div>
        <div class="dot"></div>
      </div>
    </div>
  </foreignObject>
</svg>
